# ──────────────────────────────────────────────────────────────────────────────
# Hybrid Automation Framework — Base Configuration
# Environment-specific files (config-dev.properties, config-staging.properties)
# override these values. System properties override everything.
# ──────────────────────────────────────────────────────────────────────────────

# Browser: chrome | firefox | edge | safari
browser=chrome

# Headless mode
headless=false

# Application URL
base.url=https://www.saucedemo.com

# ─── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ─── Remote Execution (Selenium Grid / BrowserStack / SauceLabs) ──────────────
remote.execution=false
remote.url=http://localhost:4444/wd/hub

# ─── API Testing ──────────────────────────────────────────────────────────────
# api.base.url=https://reqres.in/api
api.base.url=

# ─── Reporting ────────────────────────────────────────────────────────────────
screenshot.dir=target/screenshots
report.dir=target/reports

# ─── Test Data ────────────────────────────────────────────────────────────────
test.data.excel=src/test/resources/testdata/TestData.xlsx
test.data.json=src/test/resources/testdata/testdata.json

# ─── App Credentials (override per environment) ───────────────────────────────
app.username=standard_user
app.password=secret_sauce

# ─── Database (if needed) ────────────────────────────────────────────────────
# db.host=localhost
# db.port=5432
# db.name=testdb
# db.username=postgres
# db.password=password
